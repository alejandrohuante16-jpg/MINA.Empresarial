<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MINA logo export</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      background: var(--export-bg, #efebe2);
    }

    img {
      display: block;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <img alt="MINA logo export" id="logo">
  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");
    const bg = params.get("bg") || "#efebe2";
    document.body.style.setProperty("--export-bg", bg);

    if (!file || !/^[a-z0-9-]+\.svg$/i.test(file)) {
      document.body.textContent = "Missing logo file";
    } else {
      document.getElementById("logo").src = `./svg/${file}`;
    }
  </script>
</body>
</html>
