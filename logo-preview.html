<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preview logo MINA</title>
<style>
body{margin:0;font-family:Manrope,Arial,sans-serif;background:#F2EDE3;color:#15263B;display:grid;place-items:center;min-height:100vh;padding:32px}
.wrap{width:min(920px,100%)}
h1{font-size:22px;color:#1A40B8;margin:0 0 20px}
.panel{background:#fff;border:1px solid rgba(8,20,50,.12);border-radius:16px;padding:28px;box-shadow:0 18px 45px rgba(8,20,50,.08)}
img{display:block;width:100%;height:auto}
.row{display:flex;gap:18px;align-items:center;margin-top:28px;flex-wrap:wrap}
.mark{width:88px;height:88px;object-fit:contain;background:#F2EDE3;border-radius:16px;padding:12px}
p{color:#5B6675;margin:18px 0 0;font-size:14px}
</style>
</head>
<body>
  <main class="wrap">
    <h1>MINA · Propuesta 01: La Veta Oculta</h1>
    <div class="panel">
      <img src="logo-veta-oculta.svg" alt="Logo MINA propuesta La Veta Oculta">
    </div>
    <div class="row">
      <img class="mark" src="logo-veta-oculta.svg" alt="Prueba de símbolo MINA en tamaño pequeño">
      <p>Abre esta página en navegador para revisar legibilidad, proporción y personalidad visual.</p>
    </div>
  </main>
</body>
</html>
